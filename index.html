<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waste Pro System v7 - Complete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Kanit', sans-serif; padding-bottom: 100px; }
        .header { background: #1b5e20; color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .card { border: none; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        
        /* Calendar */
        .calendar-card { background: white; border-radius: 15px; padding: 15px; margin: 15px 0; border: 1px solid #e2e8f0; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-name { font-size: 0.7rem; color: #94a3b8; font-weight: bold; }
        .day-btn { padding: 8px 0; border-radius: 8px; font-size: 0.85rem; background: #f8fafc; color: #cbd5e1; border: 1px solid #f1f5f9; cursor: not-allowed; }
        .day-active { background: #fff; border: 1px solid #1b5e20; color: #1b5e20; cursor: pointer; font-weight: 600; }
        .day-selected { background: #1b5e20 !important; color: white !important; transform: scale(1.05); }

        .sticky-footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        #managerPage, #loginPage, #reportPage { display: none; }
        
        .preview-img { width: 100%; height: auto; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #ddd; }
        .log-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 5px solid #1b5e20; font-size: 0.85rem; }
        .res-item { border-bottom: 1px dashed #eee; padding: 5px 0; }
        .pass { color: #22c55e; font-weight: bold; } 
        .fail { color: #ef4444; font-weight: bold; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .log-card { box-shadow: none; border: 1px solid #eee; page-break-inside: avoid; }
            #reportPage { display: block !important; }
            .only-print { display: block !important; }
        }
    </style>
</head>
<body>

<div id="mainPage">
    <div class="header no-print">
        <span class="fw-bold">📋 ระบบตรวจสอบผู้ปฏิบัติด้านสิ่งแวดล้อม : บริษัท ไดโด สิทธิผล จำกัด </span>
        <button class="btn btn-sm btn-outline-light float-end border-0" onclick="showPage('loginPage')">⚙️</button>
    </div>

    <div class="container mt-2 no-print">
        <button class="btn btn-primary w-100 mt-3 fw-bold shadow-sm py-2" onclick="openReport()">📊 รายงานสรุปประจำเดือน</button>

        <div class="calendar-card shadow-sm">
            <div id="monthDisplay" class="text-center fw-bold text-success mb-2"></div>
            <div class="calendar-grid" id="calGrid">
                <div class="day-name">อา</div><div class="day-name">จ</div><div class="day-name">อ</div><div class="day-name">พ</div>
                <div class="day-name">พฤ</div><div class="day-name">ศ</div><div class="day-name">ส</div>
            </div>
            <input type="hidden" id="selectedDate">
        </div>

        <div class="card p-3 border-start border-4 border-success">
            <select id="areaSel" class="form-select border-0 bg-light mb-2" onchange="syncInspector()"></select>
            <input type="text" id="insName" class="form-control form-control-sm border-0 bg-light" readonly placeholder="ผู้รับผิดชอบ">
        </div>

        <div id="checkList"></div>
    </div>

    <div class="sticky-footer no-print">
        <button class="btn btn-success w-100 fw-bold py-2 shadow" onclick="saveRecord()">💾 ส่งข้อมูลการตรวจสอบ</button>
    </div>
</div>

<div id="reportPage" class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3 no-print">
        <h5 class="fw-bold mb-0 text-primary">📊 รายงานละเอียด</h5>
        <button class="btn btn-sm btn-dark" onclick="showPage('mainPage')">กลับ</button>
    </div>

    <div class="card p-3 mb-3 no-print">
        <div class="row g-2">
            <div class="col-6">
                <select id="fMonth" class="form-select form-select-sm" onchange="renderReport()"></select>
            </div>
            <div class="col-6">
                <select id="fInp" class="form-select form-select-sm" onchange="renderReport()"></select>
            </div>
        </div>
    </div>

    <div id="reportList"></div>
    
    <div class="pb-5 no-print text-center">
        <button class="btn btn-danger w-100 fw-bold py-3 mt-3 shadow" onclick="window.print()">
            📄 Export เป็นรายงาน PDF
        </button>
    </div>
</div>

<div id="loginPage" class="container mt-5 text-center no-print">
    <div class="card p-4 mx-auto shadow" style="max-width: 320px;">
        <h6 class="fw-bold mb-3">รหัสผ่านผู้จัดการ</h6>
        <input type="password" id="adminPw" class="form-control text-center mb-3" placeholder="2499">
        <button class="btn btn-primary w-100" onclick="checkPw()">ยืนยัน</button>
        <button class="btn btn-link text-muted btn-sm mt-2" onclick="showPage('mainPage')">ยกเลิก</button>
    </div>
</div>

<div id="managerPage" class="container mt-3 no-print">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0 text-danger">⚙️ ตั้งค่าและสรุปสถิติ</h5>
        <button class="btn btn-sm btn-dark" onclick="showPage('mainPage')">ปิด</button>
    </div>

    <div class="card p-3 mb-3 border-0 shadow-sm" style="background: #fff5f5;">
        <h6 class="fw-bold text-danger">📊 สรุปผลการตรวจเดือนปัจจุบัน</h6>
        <div class="table-responsive">
            <table class="table table-sm table-bordered mt-2" style="font-size: 0.8rem; background: white;">
                <thead class="table-danger">
                    <tr>
                        <th>ชื่อผู้ตรวจสอบ</th>
                        <th class="text-center">ผ่าน</th>
                        <th class="text-center">ไม่ผ่าน</th>
                    </tr>
                </thead>
                <tbody id="statTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card p-3 mb-3" id="mgrQ_container">
        <h6 class="fw-bold">1. แก้ไขหัวข้อตรวจสอบ</h6>
        <div id="mgrQ"></div>
        <button class="btn btn-sm btn-link p-0 mt-2" onclick="qs.push('หัวข้อใหม่');save();renderMgr()">+ เพิ่มหัวข้อ</button>
    </div>

    <div class="card p-3 mb-3" id="mgrL_container">
        <h6 class="fw-bold">2. แก้ไขพื้นที่ & ผู้รับผิดชอบ</h6>
        <div id="mgrL"></div>
        <div class="input-group input-group-sm mt-3">
            <input type="text" id="nA" class="form-control" placeholder="พื้นที่">
            <input type="text" id="nN" class="form-control" placeholder="ชื่อ">
            <button class="btn btn-success" onclick="if(nA.value&&nN.value){ls.push({a:nA.value,n:nN.value});save();renderMgr();nA.value='';nN.value='';}">เพิ่ม</button>
        </div>
    </div>

    <button class="btn btn-outline-danger btn-sm w-100 mb-5" onclick="clearData()">🗑️ ล้างประวัติทั้งหมด</button>
</div>

<script>
   // 1. วางค่า Firebase Config ของคุณที่นี่
    const firebaseConfig = {
  apiKey: "AIzaSyBAt4X7I-rcaNDmBBONdNFAFh5UUeuiVBo",
  authDomain: "environmental-patrol.firebaseapp.com",
  projectId: "environmental-patrol",
  storageBucket: "environmental-patrol.firebasestorage.app",
  messagingSenderId: "987894851199",
  appId: "1:987894851199:web:6ff9799e8c8f81f6ad414a",
  measurementId: "G-9JPN1S5FZ8"
};
    let qs = JSON.parse(localStorage.getItem('w_qs')) || ["แยกขยะถูกต้อง", "มีฝาปิดมิดชิด", "ป้ายชัดเจน", "ขยะไม่ล้น", "สะอาดเรียบร้อย"];
    let ls = JSON.parse(localStorage.getItem('w_ls')) || [{a:"คลังสินค้า", n:"สมชาย"}];
    let logs = JSON.parse(localStorage.getItem('w_logs')) || [];
    const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

    function save() { localStorage.setItem('w_qs', JSON.stringify(qs)); localStorage.setItem('w_ls', JSON.stringify(ls)); localStorage.setItem('w_logs', JSON.stringify(logs)); }

    function init() {
        const now = new Date();
        document.getElementById('monthDisplay').innerText = `${months[now.getMonth()]} ${now.getFullYear() + 543}`;
        const start = now.getDate() - now.getDay();
        const grid = document.getElementById('calGrid');
        const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const totalDays = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const labels = Array.from(grid.querySelectorAll('.day-name'));
        grid.innerHTML = ''; labels.forEach(l => grid.appendChild(l));
        for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=totalDays; d++) {
            const b = document.createElement('div'); b.className = 'day-btn'; b.innerText = d;
            if(d >= start && d <= start + 6) {
                b.classList.add('day-active');
                b.onclick = () => { document.querySelectorAll('.day-btn').forEach(x=>x.classList.remove('day-selected')); b.classList.add('day-selected'); document.getElementById('selectedDate').value = d; };
                if(d === now.getDate()) { b.classList.add('day-selected'); document.getElementById('selectedDate').value = d; }
            }
            grid.appendChild(b);
        }
        document.getElementById('areaSel').innerHTML = '<option value="">-- เลือกพื้นที่ --</option>' + ls.map(x => `<option value="${x.a}">${x.a}</option>`).join('');
        document.getElementById('checkList').innerHTML = qs.map((q, i) => `
            <div class="card p-3 shadow-sm mb-3">
                <div class="small fw-bold mb-2">${i+1}. ${q}</div>
                <div class="btn-group btn-group-sm w-100 mb-2">
                    <input type="radio" class="btn-check" name="r${i}" id="p${i}" value="ผ่าน" checked><label class="btn btn-outline-success" for="p${i}">ผ่าน</label>
                    <input type="radio" class="btn-check" name="r${i}" id="f${i}" value="ไม่ผ่าน"><label class="btn btn-outline-danger" for="f${i}">ไม่ผ่าน</label>
                </div>
                <textarea id="note${i}" class="form-control form-control-sm mb-2" rows="2" placeholder="รายละเอียด..."></textarea>
                <button class="btn btn-sm btn-outline-secondary mb-2" onclick="document.getElementById('img${i}').click()">📸 เพิ่มรูป</button>
                <input type="file" id="img${i}" accept="image/*" capture="environment" hidden onchange="previewImg(${i}, this)">
                <img id="pv${i}" class="preview-img">
            </div>`).join('');
    }

    function previewImg(i, input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { const img = document.getElementById(`pv${i}`); img.src = e.target.result; img.style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveRecord() {
        const area = document.getElementById('areaSel').value;
        if(!area) return alert('กรุณาเลือกพื้นที่');
        logs.push({ 
            day: document.getElementById('selectedDate').value, area, ins: document.getElementById('insName').value, 
            timestamp: new Date().toLocaleString('th-TH'), rawDate: new Date().toISOString(),
            results: qs.map((q, i) => ({ q, res: document.querySelector(`input[name="r${i}"]:checked`).value, note: document.getElementById(`note${i}`).value, img: document.getElementById(`pv${i}`).src || "" }))
        });
        save(); alert('บันทึกสำเร็จ!'); location.reload();
    }

    function renderReport() {
        const m = document.getElementById('fMonth').value;
        const inp = document.getElementById('fInp').value;
        const filtered = logs.filter(l => new Date(l.rawDate).getMonth() == m && (inp === 'all' || l.ins === inp));
        document.getElementById('reportList').innerHTML = filtered.reverse().map(l => `
            <div class="log-card p-3">
                <div class="d-flex justify-content-between fw-bold border-bottom pb-2 mb-2"><span>📍 ${l.area}</span><span>วันที่ ${l.day}</span></div>
                ${l.results.map(r => `
                    <div class="res-item">
                        <span class="${r.res=='ผ่าน'?'pass':'fail'}">${r.res=='ผ่าน'?'✅':'❌'} ${r.q}</span>
                        ${r.note ? `<div class="ps-4 small text-muted">- ${r.note}</div>` : ''}
                        ${r.img ? `<img src="${r.img}" class="mt-2 rounded" style="width:150px;display:block;">` : ''}
                    </div>`).join('')}
            </div>`).join('') || '<div class="text-center p-4">ไม่มีข้อมูล</div>';
    }

    function renderMgr() {
        const currentMonth = new Date().getMonth();
        const stats = {};
        ls.forEach(p => stats[p.n] = { p: 0, f: 0 });
        logs.forEach(log => {
            if (new Date(log.rawDate).getMonth() === currentMonth) {
                if (!stats[log.ins]) stats[log.ins] = { p: 0, f: 0 };
                log.results.some(r => r.res === 'ไม่ผ่าน') ? stats[log.ins].f++ : stats[log.ins].p++;
            }
        });
        document.getElementById('statTableBody').innerHTML = Object.keys(stats).map(n => `<tr><td>${n}</td><td class="text-center text-success fw-bold">${stats[n].p}</td><td class="text-center text-danger fw-bold">${stats[n].f}</td></tr>`).join('') || '<tr><td colspan="3" class="text-center">ไม่มีข้อมูล</td></tr>';
        document.getElementById('mgrQ').innerHTML = qs.map((q, i) => `<div class="input-group mb-1"><input type="text" class="form-control form-control-sm" value="${q}" onchange="qs[${i}]=this.value;save()"><button class="btn btn-danger btn-sm" onclick="qs.splice(${i},1);save();renderMgr()">✕</button></div>`).join('');
        document.getElementById('mgrL').innerHTML = ls.map((l, i) => `<div class="d-flex justify-content-between border-bottom py-1 small"><span>${l.a} (${l.n})</span><span class="text-danger" style="cursor:pointer" onclick="ls.splice(${i},1);save();renderMgr()">ลบ</span></div>`).join('');
    }

    function showPage(id) { document.querySelectorAll('#mainPage, #reportPage, #loginPage, #managerPage').forEach(p => p.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
    function checkPw() { if(document.getElementById('adminPw').value === '2499') { showPage('managerPage'); renderMgr(); } else alert('รหัสผิด'); }
    function syncInspector() { const f = ls.find(x => x.a === document.getElementById('areaSel').value); document.getElementById('insName').value = f ? f.n : ""; }
    function openReport() {
        showPage('reportPage');
        const now = new Date();
        document.getElementById('fMonth').innerHTML = months.map((m, i) => `<option value="${i}" ${i==now.getMonth()?'selected':''}>${m}</option>`).join('');
        document.getElementById('fInp').innerHTML = '<option value="all">ทั้งหมด</option>' + [...new Set(ls.map(x=>x.n))].map(n => `<option value="${n}">${n}</option>`).join('');
        renderReport();
    }
    function clearData() { if(confirm('ล้างทั้งหมด?')) { logs = []; save(); location.reload(); } }

    init();
</script>
</body>
</html>
